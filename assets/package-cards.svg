    </text>
    <text x="100" y="190" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
      ✓ 1 Model access
    </text>
    <text x="100" y="215" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
      ✓ QRIS payment
    </text>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
      ✓ Instant activation
    </text>
    
