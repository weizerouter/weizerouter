<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Terminal Window -->
  <rect width="800" height="400" fill="#0a0a0f"/>
  <rect x="20" y="20" width="760" height="360" rx="12" fill="url(#termGrad)" stroke="#667eea" stroke-width="2" filter="url(#termGlow)"/>
  
  <!-- Terminal Header -->
  <rect x="20" y="20" width="760" height="35" rx="12" fill="#16213e"/>
  <circle cx="45" cy="37" r="6" fill="#ff5f56"/>
  <circle cx="65" cy="37" r="6" fill="#ffbd2e"/>
  <circle cx="85" cy="37" r="6" fill="#27c93f"/>
  <text x="400" y="42" font-family="'Courier New', monospace" font-size="13" fill="#8e8e93" text-anchor="middle">
    WeizeRouter API Demo
  </text>
  
  <!-- Terminal Content -->
  <text x="40" y="85" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
    <tspan fill="#f093fb">$</tspan> curl https://weizerouter.web.id/v1/chat/completions \
  </text>
  <text x="40" y="110" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
      -H "Authorization: Bearer wzr_live_xxxx" \
  </text>
  <text x="40" y="135" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
      -H "Content-Type: application/json" \
  </text>
  <text x="40" y="160" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
      -d '{
  </text>
  <text x="40" y="185" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
        "model": "<tspan fill="#f5576c">ag/gemini-3.5-flash-low</tspan>",
  </text>
  <text x="40" y="210" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
        "messages": [{
  </text>
  <text x="40" y="235" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
          "role": "user",
  </text>
  <text x="40" y="260" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
          "content": "<tspan fill="#27c93f">Hello from WeizeRouter!</tspan>"
  </text>
  <text x="40" y="285" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
        }]
  </text>
  <text x="40" y="310" font-family="'Courier New', monospace" font-size="14" fill="#5ce1e6">
      }'
  </text>
  
  <!-- Response -->
  <text x="40" y="340" font-family="'Courier New', monospace" font-size="14" fill="#27c93f">
    <tspan fill="#f093fb">&gt;</tspan> 200 OK
  </text>
  <text x="40" y="365" font-family="'Courier New', monospace" font-size="14" fill="#27c93f">
    <tspan fill="#f093fb">&gt;</tspan> Response: "Halo! Saya siap membantu dari WeizeRouter API Gateway."
  </text>
</svg>
